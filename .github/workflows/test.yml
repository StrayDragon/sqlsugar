name: CI

on:
  push:
    branches: [main, '**-*']
  pull_request:
    branches: [main]

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: just install

      - name: Run linting and type checking
        run: just lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: just install

      - name: Run unit tests with coverage
        run: just test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  spec-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install llman and validate specs
        run: |
          curl -L -o llman.tar.gz https://github.com/StrayDragon/llman/releases/latest/download/llman-x86_64-unknown-linux-gnu.tar.gz || true
          if [ -f llman.tar.gz ] && file llman.tar.gz | grep -q "gzip"; then
            tar -xzf llman.tar.gz
            chmod +x llman
            sudo mv llman /usr/local/bin/
            llman sdd validate --all --no-interactive
          else
            echo "::warning::llman binary not available, skipping spec validation"
          fi
