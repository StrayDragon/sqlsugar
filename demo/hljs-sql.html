<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>highlight.js SQL 渲染 Demo · 亮色</title>

  <!-- 默认亮色主题：github。可在右上角下拉切换。 -->
  <link id="hljs-theme" rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --panel: #f6f8fa;
      --border: #d0d7de;
      --fg: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
    }
    header {
      margin-bottom: 16px;
    }
    header h1 {
      font-size: 18px;
      margin: 0 0 4px;
      font-weight: 600;
    }
    header p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    select, button, input[type="text"] {
      font: inherit;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      color: var(--fg);
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      font-weight: 500;
    }
    button:hover { filter: brightness(1.05); }
    button.ghost {
      background: #fff;
      color: var(--fg);
      border-color: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }

    .pane {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }
    .pane-head {
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: 0;
      outline: 0;
      resize: none;
      padding: 14px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
      tab-size: 2;
    }

    .out-wrap {
      flex: 1;
      overflow: auto;
      background: #fff;
    }
    /* 让 hljs 主题的 .hljs 背景铺满输出区 */
    .out-wrap pre {
      margin: 0;
      padding: 14px;
    }
    .out-wrap code.hljs {
      background: transparent !important;
      padding: 0;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    code.inline {
      background: var(--panel);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>highlight.js · SQL 渲染 Demo</h1>
    <p>纯 HTML + CDN，不依赖 VS Code。用于直观对比各亮色主题下 <code class="inline">1=1</code> / <code class="inline">*</code> / 字符串 / 注释 的可读性。</p>
  </header>

  <div class="toolbar">
    <label>
      hljs 主题：
      <select id="theme">
        <!-- 亮色 -->
        <optgroup label="亮色 Light">
          <option value="github" selected>github</option>
          <option value="vs">vs (VS 默认)</option>
          <option value="vscode-light">vscode-light (项目内置)</option>
          <option value="atom-one-light">atom-one-light</option>
          <option value="intellij-light">intellij-light</option>
          <option value="xcode">xcode</option>
          <option value="googlecode">googlecode</option>
          <option value="solarized-light">solarized-light</option>
        </optgroup>
        <!-- 暗色，仅作对比 -->
        <optgroup label="暗色 Dark（对比用）">
          <option value="github-dark">github-dark</option>
          <option value="vs2015">vs2015 (项目默认)</option>
          <option value="atom-one-dark">atom-one-dark</option>
        </optgroup>
      </select>
    </label>

    <label>
      <input type="checkbox" id="auto" checked> 自动渲染
    </label>

    <label>
      <input type="checkbox" id="hl-param"> 高亮 <code class="inline">:param</code> 占位符（模拟项目里的命名参数）
    </label>

    <button id="render">渲染</button>
    <button class="ghost" id="reset">重置示例</button>
  </div>

  <div class="grid">
    <div class="pane">
      <div class="pane-head"><span>SQL 输入</span><span id="len">0 字符</span></div>
      <textarea id="sql" spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <div class="pane-head"><span>渲染输出</span><span id="theme-now">github</span></div>
      <div class="out-wrap"><pre><code id="out" class="hljs language-sql"></code></pre></div>
    </div>
  </div>

  <p class="hint">
    提示：切换主题即时生效；勾选「高亮 :param」可对比项目里对命名参数的额外着色。
  </p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const SAMPLE = `-- 用户查询：覆盖 1=1 / * / 字符串 / 命名参数 / 注释
SELECT u.*, COUNT(o.id) AS order_count
FROM users u
LEFT JOIN orders o ON o.user_id = u.id
WHERE 1=1
  AND u.status = 'active'
  AND u.name LIKE '%demo_value%'
  AND u.id = :user_id
  AND o.created_at BETWEEN :start_date AND :end_date
ORDER BY u.created_at DESC
LIMIT 10;`;

    const $ = (id) => document.getElementById(id);
    const sqlEl = $('sql'), out = $('out');
    const themeSel = $('theme'), themeLink = $('hljs-theme'), themeNow = $('theme-now');
    const auto = $('auto'), hlParam = $('hl-param'), len = $('len');

    sqlEl.value = SAMPLE;
    const CDN = (t) => `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/${t}.min.css`;

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 命名参数占位符着色：在 hljs 输出之外做一层轻量后处理
    function paintParams(html) {
      // 匹配未被标签包裹的 :identifier，加蓝色 span
      return html.replace(/(:[a-zA-Z_][a-zA-Z0-9_]*)/g,
        '<span style="color:#0550ae;font-weight:600">$1</span>');
    }

    function render() {
      const sql = sqlEl.value;
      len.textContent = `${sql.length} 字符`;
      // 用 highlight() 拿 HTML 字符串，避免 highlightElement 的重复调用警告
      let html;
      try {
        html = hljs.highlight(sql, { language: 'sql', ignoreIllegals: true }).value;
      } catch (e) {
        html = escapeHtml(sql);
      }
      if (hlParam.checked) html = paintParams(html);
      out.innerHTML = html;
    }

    function setTheme(t) {
      themeLink.href = CDN(t);
      themeNow.textContent = t;
    }

    themeSel.addEventListener('change', (e) => setTheme(e.target.value));
    $('render').addEventListener('click', render);
    $('reset').addEventListener('click', () => { sqlEl.value = SAMPLE; render(); });
    hlParam.addEventListener('change', render);
    sqlEl.addEventListener('input', () => { if (auto.checked) render(); });

    // 首次渲染
    render();
  </script>
</body>
</html>
