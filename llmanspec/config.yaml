# yaml-language-server: $schema=https://raw.githubusercontent.com/StrayDragon/llman/main/artifacts/schema/configs/en/llmanspec-config.schema.json
schema: spec-driven
locale: zh-Hans

context: |
  项目: SQLSugar - VS Code 扩展，提供内联 SQL 编辑和 Jinja2 模板可视化处理
  技术栈: TypeScript, Lit (WebView UI), esbuild, Vitest, Nunjucks, pnpm
  目标定位: 全能型 SQL 开发辅助平台（嵌入式 SQL 专家 + 轻量 SQL 工作台 + 模板平台 + AI 助手）
  架构模式: 双构建目标 (CJS extension + ESM webview), DI 容器, Feature 模块化, Provider 注册模式(规划中)

rules:
  proposal:
    - 必须说明与现有功能的关系
  tasks:
    - 必须包含可验证的完成标准

extra_skills:
  - llman-sdd-new-change
  - llman-sdd-continue
  - llman-sdd-ff
  - llman-sdd-show
  - llman-sdd-sync
  - llman-sdd-validate
  - llman-sdd-verify
