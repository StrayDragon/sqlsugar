openapi: 3.0.3
info:
  title: Jinja2 Editor Inference API
  description: API for enhanced variable inference and template analysis in Jinja2 editor
  version: 2.0.0
  contact:
    name: SQLSugar Extension Team

servers:
  - url: 'internal://extension'
    description: Internal extension API

paths:
  /template/analyze:
    post:
      summary: Analyze Jinja2 template for variable inference
      operationId: analyzeTemplate
      tags:
        - Template Analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateAnalysisRequest'
      responses:
        '200':
          description: Template analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateAnalysisResponse'
        '400':
          description: Invalid template format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Template too large for real-time processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /template/validate:
    post:
      summary: Validate Jinja2 template syntax and semantics
      operationId: validateTemplate
      tags:
        - Template Validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateValidationRequest'
      responses:
        '200':
          description: Template validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateValidationResponse'

  /inference/rules:
    get:
      summary: Get current variable inference rules
      operationId: getInferenceRules
      tags:
        - Inference Configuration
      responses:
        '200':
          description: Current inference rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InferenceRule'

    post:
      summary: Add custom inference rule
      operationId: addInferenceRule
      tags:
        - Inference Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRule'
      responses:
        '201':
          description: Rule added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRule'
        '400':
          description: Invalid rule format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update inference rule
      operationId: updateInferenceRule
      tags:
        - Inference Configuration
      parameters:
        - name: ruleName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRule'
      responses:
        '200':
          description: Rule updated successfully
        '404':
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /inference/variable:
    post:
      summary: Infer type and context for specific variable
      operationId: inferVariable
      tags:
        - Variable Inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariableInferenceRequest'
      responses:
        '200':
          description: Variable inference completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariableContext'

  /preferences:
    get:
      summary: Get user preferences
      operationId: getPreferences
      tags:
        - User Preferences
      responses:
        '200':
          description: Current user preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'

    put:
      summary: Update user preferences
      operationId: updatePreferences
      tags:
        - User Preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: Preferences updated successfully

  /cache/clear:
    delete:
      summary: Clear inference cache
      operationId: clearCache
      tags:
        - Performance Management
      responses:
        '204':
          description: Cache cleared successfully

  /metrics:
    get:
      summary: Get performance metrics
      operationId: getMetrics
      tags:
        - Performance Management
      responses:
        '200':
          description: Current performance metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceMetrics'

components:
  schemas:
    # Request schemas
    TemplateAnalysisRequest:
      type: object
      required:
        - template
      properties:
        template:
          type: string
          description: Jinja2 template to analyze
        options:
          $ref: '#/components/schemas/AnalysisOptions'

    AnalysisOptions:
      type: object
      properties:
        enableCrossTemplateAnalysis:
          type: boolean
          default: false
        confidenceThreshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
        includePerformanceMetrics:
          type: boolean
          default: false
        maxProcessingTime:
          type: number
          description: Maximum processing time in milliseconds
          default: 5000

    TemplateValidationRequest:
      type: object
      required:
        - template
      properties:
        template:
          type: string
          description: Jinja2 template to validate
        strictMode:
          type: boolean
          default: false

    VariableInferenceRequest:
      type: object
      required:
        - variableName
        - template
      properties:
        variableName:
          type: string
          description: Variable name to infer
        template:
          type: string
          description: Template context for inference
        position:
          $ref: '#/components/schemas/SourcePosition'

    # Response schemas
    TemplateAnalysisResponse:
      type: object
      required:
        - variables
        - template
        - metadata
      properties:
        variables:
          type: array
          items:
            $ref: '#/components/schemas/VariableContext'
        template:
          type: string
          description: Original template
        metadata:
          $ref: '#/components/schemas/AnalysisMetadata'
        performance:
          $ref: '#/components/schemas/PerformanceMetrics'

    AnalysisMetadata:
      type: object
      required:
        - timestamp
        - version
      properties:
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        templateHash:
          type: string
        processingTime:
          type: number
          description: Processing time in milliseconds
        cacheHit:
          type: boolean

    TemplateValidationResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/ValidationSuggestion'

    # Core data types
    VariableContext:
      type: object
      required:
        - name
        - type
        - confidence
        - inferenceSource
        - positionRanges
      properties:
        name:
          type: string
          description: Variable name
        displayName:
          type: string
          description: Display name for UI
        fullName:
          type: string
          description: Full name including nested access
        type:
          $ref: '#/components/schemas/VariableType'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Confidence level of inference
        inferenceSource:
          $ref: '#/components/schemas/InferenceSource'
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/VariableType'
        usagePatterns:
          type: array
          items:
            $ref: '#/components/schemas/UsagePattern'
        suggestedDefaults:
          type: array
          items:
            $ref: '#/components/schemas/Jinja2VariableValue'
        contextualDefault:
          $ref: '#/components/schemas/Jinja2VariableValue'
        isEditable:
          type: boolean
        positionRanges:
          type: array
          items:
            $ref: '#/components/schemas/SourcePosition'
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterContext'

    VariableType:
      oneOf:
        - type: string
          enum: [string, number, date, boolean, array, object, uuid, email, json, sql_identifier, url, phone, currency, custom, unknown]
        - type: object
          description: Complex type information
          properties:
            type:
              type: string
              enum: [array, object]
            itemType:
              $ref: '#/components/schemas/VariableType'
            properties:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/VariableType'
            isOptional:
              type: boolean

    InferenceSource:
      type: object
      required:
        - type
        - confidence
        - explanation
      properties:
        type:
          type: string
          enum: [pattern, usage, assignment, cross-template, sqlalchemy, custom]
        ruleName:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        explanation:
          type: string
          description: Human-readable explanation of inference

    UsagePattern:
      type: object
      required:
        - type
        - position
      properties:
        type:
          type: string
          enum: [output, condition, iteration, assignment, filter, comparison, member_access, function_call]
        position:
          $ref: '#/components/schemas/SourcePosition'
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterContext'
        operators:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string

    SourcePosition:
      type: object
      required:
        - line
        - column
        - offset
      properties:
        line:
          type: integer
          minimum: 1
        column:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        endLine:
          type: integer
          minimum: 1
        endColumn:
          type: integer
          minimum: 1
        endOffset:
          type: integer
          minimum: 0

    FilterContext:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        arguments:
          type: array
          items:
            $ref: '#/components/schemas/Jinja2VariableValue'
        type:
          type: string
          enum: [string, number, date, boolean, array, object, sql]
        confidence:
          type: number
          minimum: 0
          maximum: 1

    Jinja2VariableValue:
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items:
            $ref: '#/components/schemas/Jinja2VariableValue'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/Jinja2VariableValue'

    InferenceRule:
      type: object
      required:
        - name
        - pattern
        - type
        - confidence
      properties:
        name:
          type: string
        pattern:
          type: string
          description: Regular expression pattern
        type:
          $ref: '#/components/schemas/VariableType'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        context:
          type: array
          items:
            type: string
        priority:
          type: integer
          description: Higher priority rules take precedence
          default: 0

    UserPreferences:
      type: object
      properties:
        inference:
          $ref: '#/components/schemas/InferencePreferences'
        scrollSync:
          $ref: '#/components/schemas/ScrollSyncPreferences'
        ui:
          $ref: '#/components/schemas/UIPreferences'
        performance:
          $ref: '#/components/schemas/PerformancePreferences'

    InferencePreferences:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        confidenceThreshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
        useContextualDefaults:
          type: boolean
          default: true
        crossTemplateAnalysis:
          type: boolean
          default: false
        customRules:
          type: array
          items:
            $ref: '#/components/schemas/InferenceRule'

    ScrollSyncPreferences:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        sensitivity:
          type: number
          minimum: 0.1
          maximum: 1
          default: 0.8
        rememberPosition:
          type: boolean
          default: true
        autoEnable:
          type: boolean
          default: true
        debounceMs:
          type: integer
          minimum: 16
          maximum: 1000
          default: 50

    UIPreferences:
      type: object
      properties:
        showTypeBadges:
          type: boolean
          default: true
        showConfidenceIndicators:
          type: boolean
          default: true
        variableHighlightStyle:
          type: string
          enum: [background, border, underline]
          default: background
        animateTransitions:
          type: boolean
          default: true

    PerformancePreferences:
      type: object
      properties:
        enableCaching:
          type: boolean
          default: true
        maxCacheSize:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        debounceMs:
          type: integer
          minimum: 50
          maximum: 1000
          default: 300
        maxTemplateSize:
          type: integer
          minimum: 1000
          maximum: 1000000
          default: 50000

    PerformanceMetrics:
      type: object
      properties:
        template:
          $ref: '#/components/schemas/TemplateMetrics'
        processing:
          $ref: '#/components/schemas/ProcessingMetrics'
        memory:
          $ref: '#/components/schemas/MemoryMetrics'
        cache:
          $ref: '#/components/schemas/CacheMetrics'

    TemplateMetrics:
      type: object
      properties:
        size:
          type: integer
          description: Template size in characters
        complexity:
          type: number
          description: Computed complexity score
        lineCount:
          type: integer
        variableCount:
          type: integer

    ProcessingMetrics:
      type: object
      properties:
        parseTime:
          type: number
          description: Parsing time in milliseconds
        inferenceTime:
          type: number
          description: Inference time in milliseconds
        renderTime:
          type: number
          description: Render time in milliseconds
        totalTime:
          type: number
          description: Total processing time in milliseconds

    MemoryMetrics:
      type: object
      properties:
        used:
          type: number
          description: Memory usage in MB
        peak:
          type: number
          description: Peak memory usage in MB
        variables:
          type: integer
          description: Number of variables in memory

    CacheMetrics:
      type: object
      properties:
        size:
          type: integer
          description: Current cache size
        maxSize:
          type: integer
          description: Maximum allowed cache size
        hitRate:
          type: number
          description: Cache hit rate percentage
        totalHits:
          type: integer
        totalMisses:
          type: integer

    # Validation schemas
    ValidationError:
      type: object
      required:
        - type
        - message
        - position
        - severity
      properties:
        type:
          type: string
          enum: [syntax, variable, logic]
        message:
          type: string
        position:
          $ref: '#/components/schemas/SourcePosition'
        severity:
          type: string
          enum: [error, warning]
        autoFixable:
          type: boolean
          default: false

    ValidationWarning:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          enum: [low_confidence, ambiguous_type, unused_variable, potential_error]
        message:
          type: string
        variable:
          type: string
        suggestion:
          type: string

    ValidationSuggestion:
      type: object
      required:
        - type
        - message
        - action
      properties:
        type:
          type: string
          enum: [type_correction, variable_rename, template_refactor]
        message:
          type: string
        action:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

    # Error response
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    internal:
      type: apiKey
      in: header
      name: X-Extension-Token

security:
  - internal: []